<!DOCTYPE html>
<html>
<head>
  <title>Patrick Ashley Ernest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    header {
      padding: 60px 20px 30px;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      margin: 0;
    }

    .subtitle {
      color: #777;
      margin-top: 10px;
      font-size: 14px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .book {
      text-align: center;
      cursor: pointer;
      transition: 0.25s;
    }

    .book:hover {
      transform: translateY(-6px);
    }

    .cover {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .title {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>

<body>

<header>
  <h1>Patrick Ashley Ernest</h1>
  <div class="subtitle">Digital Library</div>
</header>

<div class="container">

  <div class="book" onclick="openBook('importance-me.pdf')">
    <img src="covers/book1.jpg" class="cover">
    <div class="title">The Importance of Being... Me</div>
  </div>

  <div class="book" onclick="openBook('coronavirus-journal-2.pdf')">
    <img src="covers/book2.jpg" class="cover">
    <div class="title">Coronavirus Journal 2</div>
  </div>

  <div class="book" onclick="openBook('busy-people.pdf')">
    <img src="covers/book3.jpg" class="cover">
    <div class="title">Busy People Make Time</div>
  </div>

</div>

<script>
function openBook(file) {
  window.location.href = "reader.html?book=" + file;
}
</script>

</body>
</html>
