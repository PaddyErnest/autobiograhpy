<!DOCTYPE html>
<html>
<head>
  <title>Deadly Ernest</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    header {
      padding: 80px 20px 40px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -1px;
      margin: 0;
    }

    .subtitle {
      margin-top: 10px;
      color: #777;
      font-size: 16px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
    }

    .book {
      background: white;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      transition: all 0.25s ease;
    }

    .book:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .book h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .book p {
      font-size: 14px;
      color: #666;
      margin: 12px 0 20px;
    }

    .book a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: white;
      background: #111;
      padding: 10px 18px;
      border-radius: 999px;
      display: inline-block;
    }

    .book a:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>Deadly Ernest</h1>
  <div class="subtitle">A collection of stories & memoirs</div>
</header>

<div class="container">

  <div class="book">
    <h3>The Importance of Being... Me</h3>
    <p>A reflective personal journey.</p>
    <a href="importance-me.pdf" target="_blank">Read →</a>
  </div>

  <div class="book">
    <h3>Coronavirus Journal 2</h3>
    <p>Thoughts and records during the pandemic.</p>
    <a href="coronavirus-journal-2.pdf" target="_blank">Read →</a>
  </div>

  <div class="book">
    <h3>Memoir – Busy People Make Time</h3>
    <p>On priorities, life, and time.</p>
    <a href="busy-people.pdf" target="_blank">Read →</a>
  </div>

</div>

<footer>
  © 2026 Deadly Ernest
</footer>

</body>
</html>
