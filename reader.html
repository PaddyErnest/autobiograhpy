<!DOCTYPE html>
<html>
<head>
  <title>Kindle Reader V3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    /* 顶部栏 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #000;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    #title {
      font-size: 13px;
      opacity: 0.8;
    }

    /* 阅读区域 */
    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding-top: 50px;
    }

    canvas {
      max-width: 100%;
      max-height: 100vh;
    }

    /* 翻页按钮 */
    .controls {
      position: fixed;
      bottom: 12px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 20;
    }

    button {
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      background: white;
      color: black;
      font-size: 12px;
      font-weight: bold;
    }

    /* 左右点击翻页区域 */
    .hotzone {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 50%;
      z-index: 5;
    }

    .left { left: 0; }
    .right { right: 0; }

    /* 进度 */
    .progress {
      position: fixed;
      bottom: 55px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">
  <a href="index.html">← Library</a>
  <div id="title">Loading...</div>
  <div></div>
</div>

<!-- 阅读区 -->
<div class="viewer">
  <canvas id="canvas"></canvas>
</div>

<!-- 进度 -->
<div class="progress" id="progress"></div>

<!-- 控制 -->
<div class="controls">
  <button onclick="prev()">◀</button>
  <button onclick="bookmark()">🔖</button>
  <button onclick="next()">▶</button>
</div>

<!-- 翻页热区 -->
<div class="hotzone left" onclick="prev()"></div>
<div class="hotzone right" onclick="next()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const file = new URLSearchParams(location.search).get("book");

let pdfDoc = null;
let page = 1;
let scale = 1.5;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const progress = document.getElementById("progress");
const title = document.getElementById("title");

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* 📌 阅读进度恢复 */
if (file) {
  const saved = localStorage.getItem("page_" + file);
  if (saved) page = parseInt(saved);
  title.innerText = file;
}

/* 📌 加载 PDF */
pdfjsLib.getDocument(file).promise.then(pdf => {
  pdfDoc = pdf;
  render();
});

/* 📌 渲染 */
function render() {
  pdfDoc.getPage(page).then(p => {

    const viewport = p.getViewport({ scale });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    p.render({
      canvasContext: ctx,
      viewport
    });

    progress.innerText = page + " / " + pdfDoc.numPages;

    localStorage.setItem("page_" + file, page);
  });
}

/* 📌 翻页 */
function next() {
  if (!pdfDoc) return;
  if (page < pdfDoc.numPages) {
    page++;
    render();
  }
}

function prev() {
  if (!pdfDoc) return;
  if (page > 1) {
    page--;
    render();
  }
}

/* 📱 手势翻页 */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) next();
  if (endX - startX > 50) prev();
});

/* 🔖 书签 */
function bookmark() {
  localStorage.setItem("bookmark_" + file, page);
  alert("Bookmarked page " + page);
}
</script>

</body>
</html>
