<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 120px);
      padding: 10px;
    }

    canvas {
      max-width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* ⭐ 关键改动：UI永远显示（不再依赖PDF加载） */
    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 20;
    }

    button {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      font-size: 13px;
    }

    .pageinfo {
      position: fixed;
      bottom: 70px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .error {
      padding: 20px;
      color: red;
    }
  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div>Reading Mode</div>
  <div></div>
</div>

<div class="viewer">
  <canvas id="pdfCanvas"></canvas>
</div>

<div class="pageinfo" id="pageinfo">Loading...</div>

<!-- ⭐ 控制栏：永远显示（关键修复） -->
<div class="controls">
  <button onclick="prevPage()">◀ Prev</button>
  <button onclick="bookmarkPage()">🔖 Bookmark</button>
  <button onclick="nextPage()">Next ▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const file = new URLSearchParams(location.search).get("book");

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const pageinfo = document.getElementById("pageinfo");

let pdfDoc = null;
let pageNum = 1;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   📌 初始化阅读进度
   ========================= */
if (file) {
  const savedPage = localStorage.getItem("page_" + file);
  if (savedPage) pageNum = parseInt(savedPage);
}

/* =========================
   📌 加载 PDF
   ========================= */
if (!file) {
  document.body.innerHTML = "<div class='error'>No book selected</div>";
} else {

  pdfjsLib.getDocument(file).promise.then(pdf => {

    pdfDoc = pdf;

    renderPage(pageNum);

  }).catch(err => {
    console.error(err);
    pageinfo.innerText = "Failed to load PDF";
  });
}

/* =========================
   📖 渲染页面
   ========================= */
function renderPage(num) {
  if (!pdfDoc) return;

  pdfDoc.getPage(num).then(page => {

    const viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    pageinfo.innerText = num + " / " + pdfDoc.numPages;

    localStorage.setItem("page_" + file, num);
  });
}

/* =========================
   📌 翻页
   ========================= */
function nextPage() {
  if (!pdfDoc) return;
  if (pageNum >= pdfDoc.numPages) return;

  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc) return;
  if (pageNum <= 1) return;

  pageNum--;
  renderPage(pageNum);
}

/* =========================
   🔖 书签（稳定版）
   ========================= */
function bookmarkPage() {
  if (!file) return;

  localStorage.setItem("bookmark_" + file, pageNum);

  pageinfo.innerText =
    "🔖 Bookmarked page " + pageNum + " / " + pdfDoc.numPages;

  setTimeout(() => {
    pageinfo.innerText = pageNum + " / " + pdfDoc.numPages;
  }, 1200);
}

/* =========================
   📱 手势翻页
   ========================= */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextPage();
  if (endX - startX > 50) prevPage();
});
</script>

</body>
</html>
