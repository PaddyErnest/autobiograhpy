<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .topbar {
      padding: 12px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .viewer {
      width: 100%;
      height: calc(100vh - 50px);
    }

    .error {
      padding: 20px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div>Reader</div>
</div>

<div id="container"></div>

<script>
const params = new URLSearchParams(window.location.search);
const book = params.get('book');

const container = document.getElementById("container");

if (!book) {
  container.innerHTML = "<div class='error'>No book selected</div>";
} else {
  const path = "books/" + book;

  container.innerHTML = `
    <object class="viewer" data="${path}" type="application/pdf">
      <div class="error">
        Cannot display PDF.<br>
        Try opening: ${path}
      </div>
    </object>
  `;
}
</script>

</body>
</html>
