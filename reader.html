      white-space: nowrap;
      -webkit-user-select: none;

      transition: background 0.15s ease, transform 0.1s ease, opacity 0.2s ease;

      -ms-flex-align: center;
    }

    .btn:hover { background: var(--btn-hover); }
    .btn:active { background: var(--btn-active); transform: scale(0.95); }
    .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

      padding: 4px 10px;
      border-radius: 20px;

      transition: opacity 0.2s ease, transform 0.2s ease;

    .toast {

      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 200;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading {
      display: flex;
      flex-direction: column;

      gap: 12px;

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--surface-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;

    }

    .hotzone {
      position: fixed;

    }

    .hotzone.left { left: 0; }
    .hotzone.right { right: 0; }

    @media (max-width: 600px) {
      .doc-title { display: none; }
      .btn { height: 34px; padding: 0 11px; font-size: 13px; gap: 4px; }
      .btn-icon { width: 34px; }
      .page-info { min-width: 56px; font-size: 12px; }
      canvas { max-height: calc(100vh - 130px); }
    }

    .topbar, .bottombar {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
    }

    .btn {
      display: -ms-inline-flexbox;
      display: inline-flex;
    }

<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="home-btn" id="homeBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 12L6 8l4-4"/>
      </svg>
      Homepage
    </a>
  </div>
  <span class="doc-title" id="docTitle">—</span>
  <div style="width:80px;display:flex;justify-content:flex-end;"></div>
</div>

<div class="zoom-badge" id="zoomBadge">100%</div>

<div class="viewer" id="viewer">
  <div class="canvas-wrap" id="canvasWrap">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <span class="loading-text">Loading…</span>
    </div>
    <canvas id="pdfCanvas" style="display:none;"></canvas>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="bottombar">

  <button class="btn" id="btnPrev" onclick="prevPage()" title="Previous page">
    <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11.5L5 7.5l4-4"/>
    </svg>
    Prev
  </button>

  <button class="btn btn-icon" id="btnZoomOut" onclick="zoomOut()" title="Zoom out">
    <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="6.5" cy="6.5" r="4.5"/>
      <path d="M11.5 11.5l2 2" stroke-linecap="round"/>
      <path d="M4.5 6.5h4"/>
    </svg>
  </button>

  <span class="page-info" id="pageInfo">— / —</span>

  <button class="btn btn-icon" id="btnZoomIn" onclick="zoomIn()" title="Zoom in">
    <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="6.5" cy="6.5" r="4.5"/>
      <path d="M11.5 11.5l2 2" stroke-linecap="round"/>
      <path d="M4.5 6.5h4M6.5 4.5v4"/>
    </svg>
  </button>

  <button class="btn" id="btnBookmark" onclick="bookmarkPage()" title="Bookmark">
    <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 2h9v12l-4.5-3L3 14V2z"/>
    </svg>
    Mark
  </button>

  <button class="btn" id="btnNext" onclick="nextPage()" title="Next page">
    Next
    <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3.5l4 4-4 4"/>
    </svg>
  </button>

</div>

<div class="hotzone left" onclick="prevPage()"></div>
<div class="hotzone right" onclick="nextPage()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
  var SCALE_MIN  = 0.5;
  var SCALE_MAX  = 3.0;
  var SCALE_STEP = 0.25;

  var file      = new URLSearchParams(window.location.search).get('book') || '';
  var pdfDoc    = null;
  var pageNum   = 1;
  var scale     = getDefaultScale();
  var rendering = false;

  var canvas    = document.getElementById('pdfCanvas');
  var ctx       = canvas.getContext('2d');
  var pageInfo  = document.getElementById('pageInfo');
  var loading   = document.getElementById('loadingState');
  var zoomBadge = document.getElementById('zoomBadge');

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  if (file) {
    var name = file.split('/').pop().replace('.pdf','').replace(/[-_]/g,' ');
    document.getElementById('docTitle').textContent = name;
    document.title = name + ' — Reader';
    var saved = localStorage.getItem('page_' + file);
    if (saved) pageNum = parseInt(saved, 10) || 1;
  }

  function loadPDF() {
    if (!file) { showToast('No PDF specified'); return; }
    pdfjsLib.getDocument(file).promise.then(function(pdf) {
      pdfDoc = pdf;
      loading.style.display = 'none';
      canvas.style.display  = 'block';
      updateButtons();
      render();
    }).catch(function(err) {
      loading.innerHTML = '<span class="loading-text" style="color:rgba(255,80,60,0.9);">Failed to load PDF</span>';
      console.error(err);
    });
  }

  loadPDF();

  function render() {
    if (!pdfDoc || rendering) return;
    rendering = true;
    pdfDoc.getPage(pageNum).then(function(page) {
      var viewport = page.getViewport({ scale: scale });
      canvas.width  = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      var task = page.render({ canvasContext: ctx, viewport: viewport });
      task.promise.then(function() {
        rendering = false;
        pageInfo.textContent = pageNum + ' / ' + pdfDoc.numPages;
        localStorage.setItem('page_' + file, pageNum);
        updateButtons();
      }).catch(function() { rendering = false; });
    }).catch(function() { rendering = false; });
  }

  function nextPage() {
    if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
    pageNum++;
    render();
    document.getElementById('viewer').scrollTop = 0;
  }

  function prevPage() {
    if (!pdfDoc || pageNum <= 1) return;
    pageNum--;
    render();
    document.getElementById('viewer').scrollTop = 0;
  }

  function getDefaultScale() {
    return window.innerWidth < 600 ? 1.0 : 1.4;
  }

  var zoomTimer;

  function showZoom() {
    zoomBadge.textContent = Math.round(scale * 100) + '%';
    zoomBadge.classList.add('show');
    clearTimeout(zoomTimer);
    zoomTimer = setTimeout(function() { zoomBadge.classList.remove('show'); }, 1600);
  }

  function zoomIn() {
    if (scale >= SCALE_MAX) return;
    scale = Math.min(SCALE_MAX, Math.round((scale + SCALE_STEP) * 100) / 100);
    render(); showZoom();
  }

  function zoomOut() {
    if (scale <= SCALE_MIN) return;
    scale = Math.max(SCALE_MIN, Math.round((scale - SCALE_STEP) * 100) / 100);
    render(); showZoom();
  }

  function bookmarkPage() {
    localStorage.setItem('bookmark_' + file, pageNum);
    showToast('Bookmarked page ' + pageNum);
  }

  var toastTimer;
  var toastEl = document.getElementById('toast');

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
  }

  function updateButtons() {
    var btnPrev    = document.getElementById('btnPrev');
    var btnNext    = document.getElementById('btnNext');
    var btnZoomIn  = document.getElementById('btnZoomIn');
    var btnZoomOut = document.getElementById('btnZoomOut');
    if (pdfDoc) {
      btnPrev.disabled = (pageNum <= 1);
      btnNext.disabled = (pageNum >= pdfDoc.numPages);
    }
    btnZoomIn.disabled  = (scale >= SCALE_MAX);
    btnZoomOut.disabled = (scale <= SCALE_MIN);
  }

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowRight': case 'ArrowDown': case ' ':
        e.preventDefault(); nextPage(); break;
      case 'ArrowLeft': case 'ArrowUp':
        e.preventDefault(); prevPage(); break;
      case '+': case '=': zoomIn(); break;
      case '-': zoomOut(); break;
    }
  });

  var initDist = 0, initScale = scale;

  document.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      initDist = Math.sqrt(dx*dx + dy*dy);
      initScale = scale;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      var newScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, initScale * (dist / initDist)));
      newScale = Math.round(newScale * 100) / 100;
      if (Math.abs(newScale - scale) >= 0.05) { scale = newScale; render(); showZoom(); }
    }
  }, { passive: true });

  var startX = 0, startY = 0;

  document.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (e.changedTouches.length === 1) {
      var dx = e.changedTouches[0].clientX - startX;
      var dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        dx < 0 ? nextPage() : prevPage();
      }
    }
  }, { passive: true });
</script>

</body>
</html>
