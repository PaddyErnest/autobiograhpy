<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 120px);
      padding: 10px;
    }

    canvas {
      max-width: 100%;
      height: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* 控制栏 */
    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: none;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      font-size: 13px;
    }

    .error {
      padding: 20px;
      color: red;
    }

    .pageinfo {
      position: fixed;
      bottom: 70px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div>Reading Mode</div>
  <div></div>
</div>

<div class="viewer">
  <canvas id="pdfCanvas"></canvas>
</div>

<div class="pageinfo" id="pageinfo"></div>

<div class="controls" id="controls">
  <button onclick="prevPage()">◀ Prev</button>

  <!-- ⭐ 中间按钮：书签（替换夜间模式） -->
  <button onclick="bookmarkPage()">🔖 Bookmark</button>

  <button onclick="nextPage()">Next ▶</button>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get('book');

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const controls = document.getElementById("controls");
const pageinfo = document.getElementById("pageinfo");

let pdfDoc = null;
let pageNum = 1;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   📌 加载 PDF
   ========================= */
if (!file) {
  document.body.innerHTML = "<div class='error'>No book selected</div>";
} else {
  pdfjsLib.getDocument(file).promise.then(pdf => {
    pdfDoc = pdf;

    // ✔ 成功加载才显示控制栏
    controls.style.display = "flex";

    // 恢复阅读进度（如果有）
    const saved = localStorage.getItem("page_" + file);
    if (saved) pageNum = parseInt(saved);

    renderPage(pageNum);
  }).catch(err => {
    console.error(err);
    document.body.innerHTML = "<div class='error'>Failed to load PDF</div>";
  });
}

/* =========================
   📖 渲染页面
   ========================= */
function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    pageinfo.innerText = num + " / " + pdfDoc.numPages;

    // 保存进度
    localStorage.setItem("page_" + file, num);
  });
}

/* =========================
   📌 翻页逻辑（统一）
   ========================= */
function nextPage() {
  if (!pdfDoc) return;
  if (pageNum >= pdfDoc.numPages) return;

  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc) return;
  if (pageNum <= 1) return;

  pageNum--;
  renderPage(pageNum);
}

/* =========================
   🔖 书签功能（新增核心）
   ========================= */
function bookmarkPage() {
  localStorage.setItem("bookmark_" + file, pageNum);
  alert("📖 Bookmarked page " + pageNum);
}

/* =========================
   📱 手势翻页（手机体验）
   ========================= */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextPage();
  if (endX - startX > 50) prevPage();
});
</script>

</body>
</html>
