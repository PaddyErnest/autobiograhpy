<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* 顶部导航 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .title {
      font-size: 13px;
      opacity: 0.8;
    }

    /* PDF 阅读区 */
    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: #222;
    }

    /* 翻页按钮（视觉辅助） */
    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      user-select: none;
      padding: 10px;
    }

    .nav:hover {
      color: rgba(255,255,255,0.7);
    }

    .left { left: 5px; }
    .right { right: 5px; }

    /* 手机优化 */
    @media (max-width: 600px) {
      .nav {
        display: none; /* 手机隐藏翻页按钮，避免误触 */
      }
    }

  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div class="title">Reading Mode</div>
  <div></div>
</div>

<div class="nav left" onclick="prevPage()">‹</div>
<div class="nav right" onclick="nextPage()">›</div>

<iframe id="pdfViewer"></iframe>

<script>
  // 1. 获取 URL 参数
  const urlParams = new URLSearchParams(window.location.search);
  const book = urlParams.get('book');

  // 2. 当前页（用于PDF翻页）
  let page = 1;

  // 3. 加载 PDF
  function loadPDF() {
    document.getElementById("pdfViewer").src =
      "books/" + book + "#page=" + page;
  }

  // 4. 下一页
  function nextPage() {
    page++;
    loadPDF();
  }

  // 5. 上一页
  function prevPage() {
    if (page > 1) {
      page--;
      loadPDF();
    }
  }

  // 初始化
  loadPDF();
</script>

</body>
</html>
