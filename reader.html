<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* =========================
       📚 Top Bar
    ========================= */

    .topbar {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .home-link {
      color: white;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
    }

    /* =========================
       📖 Viewer
    ========================= */

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 140px);
      padding: 10px;
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border-radius: 4px;
      transition: transform 0.2s ease;
    }

    /* =========================
       🔘 Controls
    ========================= */

    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 20;
      pointer-events: none;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: white;
      color: black;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      pointer-events: auto;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn.small {
      padding: 8px 12px;
      font-size: 12px;
    }

    /* =========================
       📄 Page Info
    ========================= */

    .pageinfo {
      position: fixed;
      bottom: 80px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    /* =========================
       📱 Touch Zones
    ========================= */

    .hotzone {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 50%;
      z-index: 5;
    }

    .left { left: 0; }
    .right { right: 0; }

  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html" class="home-link">← Homepage</a>
</div>

<div class="viewer">
  <canvas id="pdfCanvas"></canvas>
</div>

<div class="pageinfo" id="pageinfo">Loading...</div>

<!-- =========================
     🔘 Controls (新增 Zoom)
========================= -->

<div class="controls">

  <button class="btn" onclick="prevPage()">◀ Prev</button>

  <button class="btn" onclick="zoomOut()">− Zoom</button>

  <button class="btn" onclick="resetZoom()">100%</button>

  <button class="btn" onclick="zoomIn()">＋ Zoom</button>

  <button class="btn" onclick="bookmarkPage()">
    🔖 Bookmark
  </button>

  <button class="btn" onclick="nextPage()">Next ▶</button>

</div>

<div class="hotzone left" onclick="prevPage()"></div>
<div class="hotzone right" onclick="nextPage()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

const file = new URLSearchParams(location.search).get("book");

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const pageinfo = document.getElementById("pageinfo");

let pdfDoc = null;
let pageNum = 1;

/* ⭐ Zoom 核心变量 */
let zoom = 1.0;
const baseScale = 1.3;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   📌 Load progress
========================= */

if (file) {
  const saved = localStorage.getItem("page_" + file);
  if (saved) pageNum = parseInt(saved);
}

/* =========================
   📖 Load PDF
========================= */

pdfjsLib.getDocument(file).promise.then(pdf => {
  pdfDoc = pdf;
  render();
});

/* =========================
   📖 Render
========================= */

function render() {

  pdfDoc.getPage(pageNum).then(page => {

    const viewport = page.getViewport({
      scale: baseScale * zoom
    });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    pageinfo.innerText =
      `${pageNum} / ${pdfDoc.numPages}  •  ${Math.round(zoom*100)}%`;

    localStorage.setItem("page_" + file, pageNum);
  });
}

/* =========================
   ▶ Navigation
========================= */

function nextPage() {
  if (pageNum < pdfDoc.numPages) {
    pageNum++;
    render();
  }
}

function prevPage() {
  if (pageNum > 1) {
    pageNum--;
    render();
  }
}

/* =========================
   🔖 Bookmark
========================= */

function bookmarkPage() {
  localStorage.setItem("bookmark_" + file, pageNum);

  pageinfo.innerText =
    "🔖 Bookmarked page " + pageNum;

  setTimeout(render, 1000);
}

/* =========================
   🔍 Zoom Controls
========================= */

function zoomIn() {
  zoom += 0.15;
  if (zoom > 2.5) zoom = 2.5;
  render();
}

function zoomOut() {
  zoom -= 0.15;
  if (zoom < 0.7) zoom = 0.7;
  render();
}

function resetZoom() {
  zoom = 1.0;
  render();
}

/* =========================
   📱 Swipe
========================= */

let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextPage();
  if (endX - startX > 50) prevPage();
});

</script>

</body>
</html>
