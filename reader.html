<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

*, *::before, ::after{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#1c1c1e;
  --surface:#2c2c2e;
  --surface-2:#3a3a3c;
  --border:rgba(255,255,255,0.1);
  --text-primary:rgba(255,255,255,0.95);
  --text-secondary:rgba(255,255,255,0.5);
  --accent:#0a84ff;
  --bar-bg:rgba(28,28,30,0.92);
  --btn-bg:rgba(255,255,255,0.1);
  --btn-hover:rgba(255,255,255,0.16);
  --btn-active:rgba(255,255,255,0.08);
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:52px;
  z-index:100;
  display:flex;
  align-items:center;
  padding:0 16px;
  background:var(--bar-bg);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}

.home-btn{
  color:white;
  text-decoration:none;
  font-size:15px;
}

.viewer{
  position:fixed;
  top:52px;
  left:0;
  right:0;
  bottom:72px;
  overflow:auto;
  padding:24px;
}

.canvas-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.doc-title{
  margin-bottom:18px;
  font-size:18px;
  font-weight:500;
  color:white;
  text-align:center;
  max-width:90vw;
  line-height:1.4;
  white-space:normal;
}

canvas{
  display:block;
  border-radius:8px;
  box-shadow:
    0 2px 8px rgba(0,0,0,.4),
    0 12px 40px rgba(0,0,0,.5);
}

.bottombar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:72px;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:0 16px 8px;
  background:var(--bar-bg);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}

.btn{
  height:36px;
  padding:0 14px;
  border:none;
  border-radius:20px;
  background:var(--btn-bg);
  color:white;
  cursor:pointer;
}

.btn:hover{
  background:var(--btn-hover);
}

.page-info{
  min-width:80px;
  text-align:center;
  color:var(--text-secondary);
  font-size:13px;
}

.loading{
  margin-top:80px;
  text-align:center;
}

.zoom-badge{
  position:fixed;
  top:64px;
  right:16px;
  background:rgba(0,0,0,.6);
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  opacity:0;
  transition:.2s;
}

.zoom-badge.show{
  opacity:1;
}

.toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:white;
  padding:8px 16px;
  border-radius:20px;
  opacity:0;
  transition:.25s;
}

.toast.show{
  opacity:1;
}

</style>
</head>

<body>

<div class="topbar">
  <a href="index.html" class="home-btn">← Homepage</a>
</div>

<div class="zoom-badge" id="zoomBadge">100%</div>

<div class="viewer">

  <div class="canvas-wrap">

    <div class="doc-title" id="docTitle">Loading...</div>

    <div class="loading" id="loadingState">
      Loading PDF...
    </div>

    <canvas id="pdfCanvas" style="display:none;"></canvas>

  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottombar">

  <button class="btn" onclick="prevPage()">Prev</button>

  <button class="btn" onclick="zoomOut()">−</button>

  <span class="page-info" id="pageInfo">— / —</span>

  <button class="btn" onclick="zoomIn()">+</button>

  <button class="btn" onclick="bookmarkPage()">🔖 Bookmark</button>

  <button class="btn" onclick="nextPage()">Next</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

const SCALE_MIN = 0.5;
const SCALE_MAX = 4;
const SCALE_STEP = 0.25;

let file = new URLSearchParams(location.search).get('book') || '';

let pdfDoc = null;
let pageNum = 1;
let scale = window.innerWidth < 600 ? 1.0 : 1.4;

const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');
const pageInfo = document.getElementById('pageInfo');
const loading = document.getElementById('loadingState');
const zoomBadge = document.getElementById('zoomBadge');

/* ===== Book Titles（修复完成） ===== */

const bookTitles = {

  "importance-me.pdf":
    "The Importance of Being... Me",

  "coronavirus-journal-2.pdf":
    "Coronavirus Journal 2",

  "busy-people.pdf":
    "Memoir – Busy People Make Time",

  "harold-ernest.pdf":
    "Harold Ernest"
};

if(file){

  const fileName = file.split('/').pop();

  document.getElementById('docTitle').textContent =
    bookTitles[fileName] || fileName;

  const saved =
    localStorage.getItem('page_' + file);

  if(saved){
    pageNum = parseInt(saved);
  }
}

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function loadPDF(){

  try{

    pdfDoc =
      await pdfjsLib.getDocument(file).promise;

    loading.style.display = 'none';
    canvas.style.display = 'block';

    render();

  }catch(err){

    console.error(err);

    loading.innerHTML =
      '<span style="color:#ff5555">Failed to load PDF</span>';
  }
}

async function render(){

  const page =
    await pdfDoc.getPage(pageNum);

  const viewport =
    page.getViewport({ scale });

  const ratio =
    window.devicePixelRatio || 1;

  canvas.width =
    viewport.width * ratio;

  canvas.height =
    viewport.height * ratio;

  canvas.style.width =
    viewport.width + 'px';

  canvas.style.height =
    viewport.height + 'px';

  ctx.setTransform(ratio,0,0,ratio,0,0);

  await page.render({
    canvasContext:ctx,
    viewport
  }).promise;

  pageInfo.textContent =
    pageNum + ' / ' + pdfDoc.numPages;

  localStorage.setItem(
    'page_' + file,
    pageNum
  );
}

function nextPage(){
  if(pageNum < pdfDoc.numPages){
    pageNum++;
    render();
  }
}

function prevPage(){
  if(pageNum > 1){
    pageNum--;
    render();
  }
}

function zoomIn(){
  scale = Math.min(SCALE_MAX, scale + SCALE_STEP);
  render();
  showZoom();
}

function zoomOut(){
  scale = Math.max(SCALE_MIN, scale - SCALE_STEP);
  render();
  showZoom();
}

function showZoom(){

  zoomBadge.innerText =
    Math.round(scale * 100) + '%';

  zoomBadge.classList.add('show');

  clearTimeout(window.zoomTimer);

  window.zoomTimer =
    setTimeout(()=>{
      zoomBadge.classList.remove('show');
    },1200);
}

function bookmarkPage(){

  localStorage.setItem(
    'bookmark_' + file,
    pageNum
  );

  showToast(
    'Bookmarked page ' + pageNum
  );
}

function showToast(msg){

  const toast =
    document.getElementById('toast');

  toast.innerText = msg;

  toast.classList.add('show');

  clearTimeout(window.toastTimer);

  window.toastTimer =
    setTimeout(()=>{
      toast.classList.remove('show');
    },2000);
}

document.addEventListener('keydown',(e)=>{

  switch(e.key){

    case 'ArrowRight':
    case 'ArrowDown':
      nextPage();
      break;

    case 'ArrowLeft':
    case 'ArrowUp':
      prevPage();
      break;

    case '+':
    case '=':
      zoomIn();
      break;

    case '-':
      zoomOut();
      break;
  }
});

loadPDF();

</script>

</body>
</html>
