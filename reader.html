<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*, *::before, *::after{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#1c1c1e;
  --surface:#2c2c2e;
  --surface-2:#3a3a3c;
  --border:rgba(255,255,255,0.1);
  --text-primary:rgba(255,255,255,0.95);
  --text-secondary:rgba(255,255,255,0.5);
  --accent:#0a84ff;
  --bar-bg:rgba(28,28,30,0.92);
  --btn-bg:rgba(255,255,255,0.1);
  --btn-hover:rgba(255,255,255,0.16);
  --btn-active:rgba(255,255,255,0.08);
  --radius:12px;
  --radius-sm:8px;
  --blur:blur(20px) saturate(180%);
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text-primary);
  font-family:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:52px;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:0 16px;
  background:var(--bar-bg);
  backdrop-filter:var(--blur);
  border-bottom:0.5px solid var(--border);
}

.home-btn{
  display:flex;
  align-items:center;
  gap:5px;
  padding:6px 10px 6px 6px;
  border-radius:var(--radius-sm);
  color:#ffffff; /* 改成白色 */
  text-decoration:none;
  font-size:15px;
  transition:background .15s ease;
}

.home-btn:hover{
  background:rgba(255,255,255,0.08);
}

.home-btn svg{
  width:16px;
  height:16px;
}

.viewer{
  position:fixed;
  top:52px;
  left:0;
  right:0;
  bottom:72px;
  overflow:auto;
  padding:24px;
}

.canvas-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100%;
}

.doc-title{
  margin-bottom:18px;
  font-size:18px;
  font-weight:500;
  color:white;
  text-align:center;
  max-width:90vw;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

canvas{
  display:block;
  border-radius:8px;
  box-shadow:
    0 2px 8px rgba(0,0,0,.4),
    0 12px 40px rgba(0,0,0,.5);
  transition:
    width .15s ease,
    height .15s ease,
    box-shadow .2s ease;
}

.bottombar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:72px;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:0 16px 8px;
  background:var(--bar-bg);
  backdrop-filter:var(--blur);
  border-top:0.5px solid var(--border);
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:0 14px;
  height:36px;
  border-radius:20px;
  border:0.5px solid var(--border);
  background:var(--btn-bg);
  color:var(--text-primary);
  font-size:14px;
  cursor:pointer;
  transition:all .15s ease;
}

.btn:hover{
  background:var(--btn-hover);
}

.btn:active{
  transform:scale(.95);
  background:var(--btn-active);
}

.btn-icon{
  width:36px;
  padding:0;
}

.page-info{
  min-width:70px;
  text-align:center;
  font-size:13px;
  color:var(--text-secondary);
}

.loading{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-top:80px;
}

.spinner{
  width:28px;
  height:28px;
  border:2px solid var(--surface-2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.zoom-badge{
  position:fixed;
  top:64px;
  right:16px;
  z-index:90;
  background:rgba(0,0,0,.6);
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  opacity:0;
  transition:.2s;
}

.zoom-badge.show{
  opacity:1;
}

.toast{
  position:fixed;
  bottom:88px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(44,44,46,.96);
  color:white;
  padding:8px 16px;
  border-radius:20px;
  opacity:0;
  transition:.25s;
}

.toast.show{
  opacity:1;
}

</style>
</head>

<body>

<div class="topbar">
  <a href="index.html" class="home-btn">
    ← Homepage
  </a>
</div>

<div class="zoom-badge" id="zoomBadge">100%</div>

<div class="viewer" id="viewer">

  <div class="canvas-wrap">

    <!-- 标题移动到PDF上方 -->
    <div class="doc-title" id="docTitle">—</div>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <span style="color:rgba(255,255,255,.5)">Loading…</span>
    </div>

    <canvas id="pdfCanvas" style="display:none;"></canvas>

  </div>

</div>

<div class="toast" id="toast"></div>

<div class="bottombar">

<button class="btn" onclick="prevPage()">Prev</button>

<button class="btn btn-icon" onclick="zoomOut()">−</button>

<span class="page-info" id="pageInfo">— / —</span>

<button class="btn btn-icon" onclick="zoomIn()">+</button>

<button class="btn" onclick="bookmarkPage()">Mark</button>

<button class="btn" onclick="nextPage()">Next</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

const SCALE_MIN = 0.5;
const SCALE_MAX = 4;
const SCALE_STEP = 0.25;

let file = new URLSearchParams(location.search).get('book') || '';
let pdfDoc = null;
let pageNum = 1;
let scale = window.innerWidth < 600 ? 1.0 : 1.4;

const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');
const pageInfo = document.getElementById('pageInfo');
const loading = document.getElementById('loadingState');
const zoomBadge = document.getElementById('zoomBadge');

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

if(file){

  let name = file
    .split('/')
    .pop()
    .replace('.pdf','')
    .replace(/[-_]/g,' ');

  document.getElementById('docTitle').textContent = name;

  const saved = localStorage.getItem('page_' + file);

  if(saved){
    pageNum = parseInt(saved);
  }
}

async function loadPDF(){

  if(!file){
    showToast('No PDF specified');
    return;
  }

  try{

    pdfDoc = await pdfjsLib.getDocument(file).promise;

    loading.style.display = 'none';
    canvas.style.display = 'block';

    render();

  }catch(err){

    console.error(err);

    loading.innerHTML =
      '<span style="color:#ff5555">Failed to load PDF</span>';
  }
}

async function render(){

  if(!pdfDoc) return;

  const page = await pdfDoc.getPage(pageNum);

  const viewport = page.getViewport({ scale });

  const ratio = window.devicePixelRatio || 1;

  canvas.width = viewport.width * ratio;
  canvas.height = viewport.height * ratio;

  canvas.style.width = viewport.width + 'px';
  canvas.style.height = viewport.height + 'px';

  ctx.setTransform(ratio,0,0,ratio,0,0);

  await page.render({
    canvasContext:ctx,
    viewport
  }).promise;

  pageInfo.textContent =
    pageNum + ' / ' + pdfDoc.numPages;

  localStorage.setItem('page_' + file,pageNum);

  updateButtons();
}

loadPDF();

function nextPage(){

  if(pageNum >= pdfDoc.numPages) return;

  pageNum++;

  render();
}

function prevPage(){

  if(pageNum <= 1) return;

  pageNum--;

  render();
}

function zoomIn(){

  scale = Math.min(SCALE_MAX, scale + SCALE_STEP);

  render();

  showZoom();
}

function zoomOut(){

  scale = Math.max(SCALE_MIN, scale - SCALE_STEP);

  render();

  showZoom();
}

function showZoom(){

  zoomBadge.innerText =
    Math.round(scale * 100) + '%';

  zoomBadge.classList.add('show');

  clearTimeout(window.zoomTimer);

  window.zoomTimer = setTimeout(()=>{
    zoomBadge.classList.remove('show');
  },1200);
}

function bookmarkPage(){

  localStorage.setItem(
    'bookmark_' + file,
    pageNum
  );

  showToast('Bookmarked page ' + pageNum);
}

function showToast(msg){

  const toast = document.getElementById('toast');

  toast.innerText = msg;

  toast.classList.add('show');

  clearTimeout(window.toastTimer);

  window.toastTimer = setTimeout(()=>{
    toast.classList.remove('show');
  },2000);
}

function updateButtons(){

  document.querySelectorAll('.btn')[0].disabled =
    pageNum <= 1;

  document.querySelectorAll('.btn')[4].disabled =
    pageNum >= pdfDoc.numPages;
}

document.addEventListener('keydown',(e)=>{

  switch(e.key){

    case 'ArrowRight':
    case 'ArrowDown':
      nextPage();
      break;

    case 'ArrowLeft':
    case 'ArrowUp':
      prevPage();
      break;

    case '+':
    case '=':
      zoomIn();
      break;

    case '-':
      zoomOut();
      break;
  }
});

</script>

</body>
</html>
