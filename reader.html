<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 120px);
      padding: 10px;
    }

    canvas {
      max-width: 100%;
      height: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* 🔥 控制按钮（默认隐藏，加载后显示） */
    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: none;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
    }

    .error {
      padding: 20px;
      color: red;
    }
  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div>Reading Mode</div>
  <div></div>
</div>

<div class="viewer">
  <canvas id="pdfCanvas"></canvas>
</div>

<div class="controls" id="controls">
  <button onclick="prevPage()">◀ Prev</button>
  <button onclick="nextPage()">Next ▶</button>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get('book');

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const controls = document.getElementById("controls");

let pdfDoc = null;
let pageNum = 1;
let pageRendering = false;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   📌 加载 PDF
   ========================= */
if (!file) {
  document.body.innerHTML = "<div class='error'>No book selected</div>";
} else {
  pdfjsLib.getDocument(file).promise.then(pdf => {
    pdfDoc = pdf;

    // ✔ 关键修复：PDF加载成功后再显示按钮
    controls.style.display = "flex";

    renderPage(pageNum);
  }).catch(err => {
    document.body.innerHTML = "<div class='error'>Failed to load PDF</div>";
    console.error(err);
  });
}

/* =========================
   📌 渲染页面
   ========================= */
function renderPage(num) {
  pageRendering = true;

  pdfDoc.getPage(num).then(page => {
    const viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext).promise.then(() => {
      pageRendering = false;
    });
  });
}

/* =========================
   📌 翻页控制（统一所有书）
   ========================= */
function nextPage() {
  if (!pdfDoc) return;
  if (pageNum >= pdfDoc.numPages) return;

  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc) return;
  if (pageNum <= 1) return;

  pageNum--;
  renderPage(pageNum);
}
</script>

</body>
</html>
