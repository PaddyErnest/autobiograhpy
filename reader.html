<script>

const file =
  new URLSearchParams(window.location.search).get("book");

const canvas =
  document.getElementById("pdfCanvas");

const ctx =
  canvas.getContext("2d");

const pageinfo =
  document.getElementById("pageinfo");

let pdfDoc = null;
let pageNum = 1;

/* =========================
   📚 PDF Worker
========================= */

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   📌 Restore Progress
========================= */

if (file) {
  const savedPage =
    localStorage.getItem("page_" + file);

  if (savedPage) {
    pageNum = parseInt(savedPage);
  }
}

/* =========================
   📖 Load PDF
========================= */

pdfjsLib.getDocument(file).promise.then(pdf => {
  pdfDoc = pdf;
  render();
});

/* =========================
   📖 Render
========================= */

function render() {

  pdfDoc.getPage(pageNum).then(page => {

    const isMobile =
      window.innerWidth < 768;

    const scale =
      isMobile ? 1.2 : 1.5;

    const viewport =
      page.getViewport({ scale });

    canvas.height =
      viewport.height;

    canvas.width =
      viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    pageinfo.innerText =
      pageNum + " / " + pdfDoc.numPages;

    localStorage.setItem("page_" + file, pageNum);

  });
}

/* =========================
   ▶ Next / Prev
========================= */

function nextPage() {
  if (!pdfDoc) return;
  if (pageNum < pdfDoc.numPages) {
    pageNum++;
    render();
  }
}

function prevPage() {
  if (!pdfDoc) return;
  if (pageNum > 1) {
    pageNum--;
    render();
  }
}

/* =========================
   🔖 Bookmark
========================= */

function bookmarkPage() {

  localStorage.setItem(
    "bookmark_" + file,
    pageNum
  );

  pageinfo.innerText =
    "🔖 Bookmarked page " + pageNum;

  setTimeout(() => {
    pageinfo.innerText =
      pageNum + " / " + pdfDoc.numPages;
  }, 1000);
}

/* =========================
   📱 FIXED SWIPE LOGIC (关键修复)
========================= */

let startX = 0;
let startY = 0;
let touching = false;
let multiTouch = false;

document.addEventListener("touchstart", e => {

  touching = true;

  // 👇 两指以上 → 禁止翻页
  if (e.touches.length > 1) {
    multiTouch = true;
    return;
  }

  multiTouch = false;

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

});

document.addEventListener("touchend", e => {

  touching = false;

  // ❌ 如果是 pinch zoom（多指操作）→ 直接忽略
  if (multiTouch) {
    multiTouch = false;
    return;
  }

  let endX =
    e.changedTouches[0].clientX;

  let endY =
    e.changedTouches[0].clientY;

  let diffX = startX - endX;
  let diffY = startY - endY;

  // 📌 防止误判：必须“水平滑动明显大于垂直”
  if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {

    if (diffX > 0) {
      nextPage();
    } else {
      prevPage();
    }
  }

});

</script>
