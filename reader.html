<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }

    .topbar {
      padding: 10px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }

    .error {
      padding: 20px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div>Reader</div>
</div>

<iframe id="viewer"></iframe>

<div id="error" class="error" style="display:none;"></div>

<script>
const params = new URLSearchParams(window.location.search);
const book = params.get('book');

const viewer = document.getElementById("viewer");
const errorBox = document.getElementById("error");

if (!book) {
  errorBox.style.display = "block";
  errorBox.innerText = "No book selected.";
} else {
  const path = "books/" + book;
  viewer.src = path;

  // 简单兜底提示（如果加载失败）
  viewer.onerror = function() {
    errorBox.style.display = "block";
    errorBox.innerText = "Cannot load: " + path;
  };
}
</script>

</body>
</html>
