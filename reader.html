<script>
const params = new URLSearchParams(window.location.search);
let book = params.get('book');

const container = document.getElementById("container");

// ❗ 自动路径识别逻辑（核心）
function resolvePath(file) {
  if (!file) return null;

  // 如果已经是完整路径（包含 / ）
  if (file.includes("/")) {
    return file;
  }

  // 默认放 books 文件夹
  return "books/" + file;
}

if (!book) {
  container.innerHTML = "<div style='color:red;padding:20px'>No book selected</div>";
} else {
  const path = resolvePath(book);

  container.innerHTML = `
    <object data="${path}" type="application/pdf" style="width:100%;height:100vh;">
      <div style="color:red;padding:20px">
        Cannot load PDF: ${path}
      </div>
    </object>
  `;
}
</script>
