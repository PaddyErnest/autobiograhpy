<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* 顶部导航栏 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .title {
      font-size: 13px;
      opacity: 0.8;
    }

    /* PDF展示区域 */
    .viewer {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: #111;
    }

    /* 错误提示 */
    .error {
      padding: 20px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- 顶部栏 -->
<div class="topbar">
  <a href="index.html">← Library</a>
  <div class="title">Reading Mode</div>
  <div></div>
</div>

<!-- PDF容器 -->
<div id="container"></div>

<script>
const params = new URLSearchParams(window.location.search);
const book = params.get('book');

const container = document.getElementById("container");

/*
  ✅ 核心逻辑：
  - 你现在所有 PDF 都在根目录
  - 所以直接使用文件名即可
*/
function resolvePath(file) {
  if (!file) return null;

  // 去掉可能的前导 /
  file = file.replace(/^\//, '');

  // 根目录模式：直接返回
  return file;
}

if (!book) {
  container.innerHTML = "<div class='error'>No book selected</div>";
} else {
  const path = resolvePath(book);

  container.innerHTML = `
    <iframe 
      class="viewer"
      src="${path}">
    </iframe>

    <noscript>
      <div class="error">
        Cannot load PDF: ${path}
      </div>
    </noscript>
  `;
}
</script>

</body>
</html>
