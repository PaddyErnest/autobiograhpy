<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 120px);
      padding: 10px;
    }

    canvas {
      max-width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* ⭐ 统一控制栏样式 */
    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 18px;
      z-index: 20;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: white;
      color: black;
      font-size: 13px;
      font-weight: 500;
    }

    .btn span.icon {
      font-size: 14px;
    }

    .pageinfo {
      position: fixed;
      bottom: 70px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .hotzone {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 50%;
    }

    .left { left: 0; }
    .right { right: 0; }
  </style>
</head>

<body>

<div class="topbar">
  <a href="index.html">← Library</a>
  <div>Reading Mode</div>
  <div></div>
</div>

<div class="viewer">
  <canvas id="pdfCanvas"></canvas>
</div>

<div class="pageinfo" id="pageinfo">Loading...</div>

<!-- ⭐ 统一按钮：图标 + 文字 Bookmark -->
<div class="controls">
  <button class="btn" onclick="prevPage()">◀ Prev</button>

  <button class="btn" onclick="bookmarkPage()">
    <span class="icon">🔖</span>
    Bookmark
  </button>

  <button class="btn" onclick="nextPage()">Next ▶</button>
</div>

<!-- 翻页热区 -->
<div class="hotzone left" onclick="prevPage()"></div>
<div class="hotzone right" onclick="nextPage()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const file = new URLSearchParams(location.search).get("book");

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const pageinfo = document.getElementById("pageinfo");

let pdfDoc = null;
let pageNum = 1;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   📌 初始化进度
   ========================= */
if (file) {
  const saved = localStorage.getItem("page_" + file);
  if (saved) pageNum = parseInt(saved);
}

/* =========================
   📌 加载 PDF
   ========================= */
pdfjsLib.getDocument(file).promise.then(pdf => {
  pdfDoc = pdf;
  render();
});

/* =========================
   📖 渲染
   ========================= */
function render() {
  pdfDoc.getPage(pageNum).then(page => {

    const viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    pageinfo.innerText = pageNum + " / " + pdfDoc.numPages;

    localStorage.setItem("page_" + file, pageNum);
  });
}

/* =========================
   📌 翻页
   ========================= */
function nextPage() {
  if (pageNum < pdfDoc.numPages) {
    pageNum++;
    render();
  }
}

function prevPage() {
  if (pageNum > 1) {
    pageNum--;
    render();
  }
}

/* =========================
   🔖 书签功能（统一）
   ========================= */
function bookmarkPage() {
  localStorage.setItem("bookmark_" + file, pageNum);
  alert("Bookmarked page " + pageNum);
}

/* =========================
   📱 手势翻页
   ========================= */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextPage();
  if (endX - startX > 50) prevPage();
});
</script>

</body>
</html>
